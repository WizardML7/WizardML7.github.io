  <style>

    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }

    <style>#__bundler_loading { display: none; }</style>
    <div style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">

  <!-- Mobile fixes for the bundled landing page.
       The bundle REPLACES the whole document when it unpacks, so a plain
       injected <style> gets wiped. This script is self-healing: it keeps a
       lightweight interval that (1) re-injects its stylesheet into the
       current <head>, and (2) applies inline !important styles to the nav
       and the theme-switcher pill (whose own positioning is inline, so it
       needs !important to override). The page content (encoded payload) is
       never touched — only the real <nav> and the switcher pill are. -->
  <script>
    (function () {
      var MQ = '(max-width: 640px)';
      var CSS =
        '@media ' + MQ + '{' +
          /* The top nav: scroll horizontally, hide the scrollbar, and keep a
             real gap after the brand so the first link isn't glued to it. */
          'nav{overflow-x:auto !important;-webkit-overflow-scrolling:touch;scrollbar-width:none;' +
            'max-width:100vw !important;padding-left:14px !important;padding-right:14px !important;' +
            'gap:26px !important;justify-content:flex-start !important;}' +
          'nav::-webkit-scrollbar{display:none;}' +
          'nav>:first-child{margin-right:26px !important;flex:0 0 auto;}' +  /* brand → links gap */
          /* Any row we tag as a scrollable card strip. */
          '[data-wz-scroll]{overflow-x:auto !important;overflow-y:visible !important;' +
            '-webkit-overflow-scrolling:touch;max-width:100% !important;min-width:0 !important;' +
            'scrollbar-width:none;}' +
          '[data-wz-scroll]::-webkit-scrollbar{display:none;}' +
          /* keep cards inside a scrollable strip from being squished — let them
             size naturally and scroll instead. */
          '[data-wz-scroll]>*{flex:0 0 auto;}' +
        '}';

      function ensureStyle() {
        if (document.getElementById('wz-mobile-fix')) return;
        var st = document.createElement('style');
        st.id = 'wz-mobile-fix';
        st.textContent = CSS;
        (document.head || document.documentElement).appendChild(st);
      }

      // Make any grid/flex row that overflows the screen horizontally scrollable.
      // This covers Projects (a 3-col grid) and any other card strip — the cards
      // have real <a> links, so they MUST stay reachable on a phone.
      function fixScrollableRows() {
        var small = window.matchMedia(MQ).matches;
        var vw = window.innerWidth;
        var nodes = document.querySelectorAll('div,section,ul,ol');
        for (var i = 0; i < nodes.length; i++) {
          var el = nodes[i];
          if (el.closest('nav')) continue;                 // nav handled separately
          if (!small) { if (el.hasAttribute('data-wz-scroll')) el.removeAttribute('data-wz-scroll'); continue; }
          var cs = getComputedStyle(el);
          var isRow = cs.display === 'grid' || cs.display === 'flex' || cs.display === 'inline-flex';
          // overflowing horizontally, but the element itself fits the viewport
          // (so we scroll its contents, not push the page wider)
          var overflowsX = el.scrollWidth > el.clientWidth + 8;
          var fitsViewport = el.getBoundingClientRect().width <= vw + 2;
          if (isRow && overflowsX && fitsViewport && el.clientWidth > 80) {
            el.setAttribute('data-wz-scroll', '');
          }
        }
      }

      function fixSwitcher() {
        var small = window.matchMedia(MQ).matches;
        var btn = document.querySelector('button[title="Arcane Teal"], button[title="Spellbound Violet"]');
        if (!btn) return;
        var pill = btn;
        while (pill && pill !== document.body && getComputedStyle(pill).position !== 'fixed') pill = pill.parentElement;
        if (!pill || pill === document.body) return;
        if (small) {
          // Compact and corner-pinned so it can't sit over the hero content.
          pill.style.setProperty('right', '10px', 'important');
          pill.style.setProperty('left', 'auto', 'important');
          pill.style.setProperty('bottom', '10px', 'important');
          pill.style.setProperty('padding', '7px 11px', 'important');
          pill.style.setProperty('gap', '9px', 'important');
          pill.style.setProperty('max-width', 'calc(100vw - 20px)', 'important');
          // Hide the leading icon + the "THEME" text label to slim the pill to
          // just the six color swatches. The label is the pill's first element
          // child (the swatches live in a row container after it); hide whichever
          // of the first children is not the swatch row.
          var kids = pill.children, swatchRow = null;
          for (var i = 0; i < kids.length; i++) {
            if (kids[i].querySelector && kids[i].querySelector('button[title]')) { swatchRow = kids[i]; break; }
          }
          for (var j = 0; j < kids.length; j++) {
            if (kids[j] !== swatchRow) kids[j].style.setProperty('display', 'none', 'important');
          }
          // The "THEME" label may be a raw text node directly on the pill
          // (not an element). Blank it once, remembering it for restore.
          pill.childNodes.forEach(function (n) {
            if (n.nodeType === 3 && (n.textContent || '').trim()) {
              if (n.__wzText == null) n.__wzText = n.textContent;
              n.textContent = '';
            }
          });
        } else {
          ['right','left','bottom','padding','gap','max-width'].forEach(function (p) {
            pill.style.removeProperty(p);
          });
          for (var k = 0; k < pill.children.length; k++) pill.children[k].style.removeProperty('display');
          pill.childNodes.forEach(function (n) {
            if (n.nodeType === 3 && n.__wzText != null) n.textContent = n.__wzText;
          });
        }
      }

      function tick() { ensureStyle(); fixSwitcher(); fixScrollableRows(); }
      // Run continuously but cheaply: the bundle can re-render and wipe our
      // work, so we keep re-applying. 400ms is imperceptible and very light.
      setInterval(tick, 400);
      tick();
      document.addEventListener('DOMContentLoaded', tick);
      window.addEventListener('resize', tick);
    })();
  </script>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#0D0D0D"></rect><g transform="translate(50 52)"><path d="M0 -22 L-14 14 L14 14 Z" fill="#11363A" stroke="#13C4DC" stroke-width="2.4" stroke-linejoin="round"></path><ellipse cx="0" cy="15" rx="22" ry="6.5" fill="#0B2629" stroke="#13C4DC" stroke-width="2.4"></ellipse><path d="M-7 20 Q0 27 7 20" fill="none" stroke="#1FB46A" stroke-width="3" stroke-linecap="round"></path><path d="M0 -10 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z" fill="#74D6FF"></path></g></svg>

  <div id="__bundler_loading">Unpacking...</div>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"><i data-lucide=\"folder-git-2\" style=\"width:17px;height:17px;\"><\u002Fi>View Projects<\u002Fa>\n          <a href=\"https://github.com/WizardML7\" target=\"_blank\" style=\"display:inline-flex;align-items:center;gap:9px;background:transparent;color:#fff;font-size:15px;font-weight:700;padding:14px 24px;border-radius:4px;border:1px solid rgba(255,255,255,0.34);\" style-hover=\"border-color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06);\"><svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" fill=\"currentColor\" style=\"flex:none;\" aria-hidden=\"true\"><path d=\"M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.07 11.07 0 0 1 5.8 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.14 0 1.55-.01 2.8-.01 3.18 0 .31.21.68.8.56C20.71 21.39 24 17.08 24 12 24 5.73 18.77.5 12 .5z\"><\u002Fpath><\u002Fsvg>GitHub<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:16px;\">\n        <div style=\"position:relative;animation:floaty 6s ease-in-out infinite;\">\n          <div style=\"position:absolute;inset:-28px;border-radius:50%;background:radial-gradient(circle,rgba(var(--accent-rgb),0.5) 0%,rgba(var(--accent-rgb),0) 70%);animation:glowPulse 4.5s ease-in-out infinite;\"><\u002Fdiv>\n          <div style=\"position:relative;width:182px;height:182px;border-radius:50%;background:#11161a;border:2px solid var(--accent);box-shadow:0 0 40px rgba(var(--accent-rgb),0.35);overflow:hidden;\">\n            <img src=\"6bffa7df-36b9-4a6e-adf8-88be2478af29\" alt=\"WizardML7 avatar\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font-family:'Source Code Pro',monospace;font-size:14px;color:#A0A4A8;\">@WizardML7<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n  <\u002Fsc-if>\n\n  <!-- ============ ABOUT ============ -->\n  <section id=\"about\" style=\"position:relative;padding:90px 40px;background:#0D0D0D;border-top:1px solid #1c2024;\">\n    <div style=\"max-width:1100px;margin:0 auto;display:grid;grid-template-columns:0.85fr 1.15fr;gap:70px;align-items:start;\">\n      <div>\n        <div style=\"font-family:'Source Code Pro',monospace;font-size:13px;color:var(--accent);letter-spacing:0.06em;margin-bottom:16px;\">// ABOUT<\u002Fdiv>\n        <h2 style=\"font-size:38px;line-height:1.05;font-weight:800;letter-spacing:-0.02em;margin:0;\">About me<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:20px;line-height:1.6;color:#cfd2d6;margin:0 0 22px;\">I'm an Offensive Security Engineer at Praetorian, where I run external network, internal network, and web application assessments for enterprise clients — identifying real, exploitable weaknesses and helping teams close them.<\u002Fp>\n        <p style=\"font-size:18px;line-height:1.62;color:#A0A4A8;margin:0;\">My background spans red teaming, vulnerability research, cryptographic and side-channel analysis, and building the security tooling that makes offensive work repeatable. I hold MS &amp; BS degrees in Computing Security from RIT, and I publish tools and research openly under the handle <span style=\"font-family:'Source Code Pro',monospace;color:#fff;\">@WizardML7<\u002Fspan>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EXPERIENCE ============ -->\n  <section id=\"experience\" style=\"position:relative;padding:90px 40px;background:#171717;border-top:1px solid #1c2024;\">\n    <div style=\"max-width:1100px;margin:0 auto;\">\n      <div style=\"font-family:'Source Code Pro',monospace;font-size:13px;color:var(--accent);letter-spacing:0.06em;margin-bottom:14px;\">// EXPERIENCE<\u002Fdiv>\n      <h2 style=\"font-size:38px;font-weight:800;letter-spacing:-0.02em;margin:0 0 56px;\">Where I've operated<\u002Fh2>\n      <div style=\"position:relative;padding-left:34px;\">\n        <div style=\"position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--accent),#2a3036);\"><\u002Fdiv>\n\n        <div style=\"position:relative;margin-bottom:46px;\">\n          <span style=\"position:absolute;left:-34px;top:5px;width:16px;height:16px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px rgba(var(--accent-rgb),0.6);border:3px solid #171717;\"><\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px;\">\n            <h3 style=\"font-size:23px;font-weight:700;margin:0;\">Offensive Security Engineer<\u002Fh3>\n            <span style=\"font-size:16px;color:var(--accent);font-weight:700;\">Praetorian<\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:13px;color:#535B61;margin-left:auto;\">2025 — Present<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:17px;line-height:1.6;color:#A0A4A8;margin:0;max-width:760px;\">Conducting external network, internal network, and web application security assessments for enterprise clients — identifying vulnerabilities and strengthening security postures against real-world adversaries.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;margin-bottom:46px;\">\n          <span style=\"position:absolute;left:-34px;top:5px;width:16px;height:16px;border-radius:50%;background:#1F252A;border:3px solid #171717;outline:2px solid #2a3036;\"><\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px;\">\n            <h3 style=\"font-size:23px;font-weight:700;margin:0;\">Research Assistant<\u002Fh3>\n            <span style=\"font-size:16px;color:#11C3DB;font-weight:700;\">Malware Benchmark Dataset Research<\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:13px;color:#535B61;margin-left:auto;\">May 2024 — Aug 2024<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:17px;line-height:1.6;color:#A0A4A8;margin:0;max-width:760px;\">Designed and established a benchmark dataset of malware samples for the research community. Built a Flask web interface with PostgreSQL for secure storage and Docker for isolated feature extraction.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;\">\n          <span style=\"position:absolute;left:-34px;top:5px;width:16px;height:16px;border-radius:50%;background:#1F252A;border:3px solid #171717;outline:2px solid #2a3036;\"><\u002Fspan>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;gap:12px;margin-bottom:6px;\">\n            <h3 style=\"font-size:23px;font-weight:700;margin:0;\">Cybersecurity Intern<\u002Fh3>\n            <span style=\"font-size:16px;color:#11C3DB;font-weight:700;\">Little Caesars<\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:13px;color:#535B61;margin-left:auto;\">May 2022 — Dec 2023<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:17px;line-height:1.6;color:#A0A4A8;margin:0;max-width:760px;\">Worked with the cybersecurity architecture and engineering team on threat modeling, security solutions, and tooling configuration. Owned application-security tasks — guidelines, standards, and deploying SAST/DAST tools including Snyk.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROJECTS ============ -->\n  <section id=\"projects\" style=\"position:relative;padding:90px 40px;background:#0D0D0D;border-top:1px solid #1c2024;\">\n    <div style=\"max-width:1100px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:flex olor:#A0A4A8;margin:0;flex:1;\">Masters capstone demonstrating measurable acoustic leakage in VoIP and cryptographic operations via real-time spectrogram analysis.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">View on GitHub<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fspan>\n        <\u002Fa>\n\n        <a href=\"https://wizardml7.github.io/ChatCSEC\" target=\"_blank\" style=\"display:flex;flex-direction:column;background:#1A1F23;border:1px solid #2a3036;border-radius:12px;padding:26px;min-height:230px;color:#fff;transition:border-color 200ms,transform 200ms;\" style-hover=\"border-color:#535B61;transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n            <span style=\"display:inline-flex;width:46px;height:46px;border-radius:10px;background:rgba(17,195,219,0.12);align-items:center;justify-content:center;\"><i data-lucide=\"bot\" style=\"width:24px;height:24px;color:#11C3DB;\"><\u002Fi><\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:0.08em;color:#11C3DB;border:1px solid rgba(17,195,219,0.4);border-radius:4px;padding:3px 8px;\">LLM<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 9px;\">ChatCSEC<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.5;color:#A0A4A8;margin:0;flex:1;\">An LLM-based chatbot for computing-security education. Undergraduate capstone — designed, built, and deployed with a team.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">Learn more<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fspan>\n        <\u002Fa>\n\n        <a href=\"https://wizardml7.github.io/Cuckoo-Watchtower\" target=\"_blank\" style=\"display:flex;flex-direction:column;background:#1A1F23;border:1px solid #2a3036;border-radius:12px;padding:26px;min-height:230px;color:#fff;transition:border-color 200ms,transform 200ms;\" style-hover=\"border-color:#535B61;transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n            <span style=\"display:inline-flex;width:46px;height:46px;border-radius:10px;background:rgba(246,195,67,0.12);align-items:center;justify-content:center;\"><i data-lucide=\"bug\" style=\"width:24px;height:24px;color:#F6C343;\"><\u002Fi><\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:0.08em;color:#F6C343;border:1px solid rgba(246,195,67,0.4);border-radius:4px;padding:3px 8px;\">MALWARE<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 9px;\">Cuckoo Watchtower<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.5;color:#A0A4A8;margin:0;flex:1;\">Malware-forensics assistant integrating GPT-4 to analyze Cuckoo Sandbox JSON reports with interactive, chatbot-style insights.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">Learn more<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fspan>\n        <\u002Fa>\n\n        <a href=\"https://wizardml7.github.io/AudioCovertChannel\" target=\"_blank\" style=\"display:flex;flex-direction:column;background:#1A1F23;border:1px solid #2a3036;border-radius:12px;padding:26px;min-height:230px;color:#fff;transition:border-color 200ms,transform 200ms;\" style-hover=\"border-color:#535B61;transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n            <span style=\"display:inline-flex;width:46px;height:46px;border-radius:10px;background:rgba(59,170,92,0.12);align-items:center;justify-content:center;\"><i data-lucide=\"radio\" style=\"width:24px;height:24px;color:#3BAA5C;\"><\u002Fi><\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:0.08em;color:#3BAA5C;border:1px solid rgba(59,170,92,0.4);border-radius:4px;padding:3px 8px;\">STEGO<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 9px;\">AudioCovert<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.5;color:#A0A4A8;margin:0;flex:1;\">Embeds and decodes hidden messages in WAV files by manipulating high-frequency signals, recovered via spectrogram inspection.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">Learn more<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fspan>\n        <\u002Fa>\n\n        <a href=\"https://wizardml7.github.io/QtFuzzer\" target=\"_blank\" style=\"display:flex;flex-direction:column;background:#1A1F23;border:1px solid #2a3036;border-radius:12px;padding:26px;min-height:230px;color:#fff;transition:border-color 200ms,transform 200ms;\" style-hover=\"border-color:#535B61;transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n            <span style=\"display:inline-flex;width:46px;height:46px;border-radius:10px;background:rgba(160,164,168,0.12);align-items:center;justify-content:center;\"><i data-lucide=\"terminal-square\" style=\"width:24px;height:24px;color:#cfd2d6;\"><\u002Fi><\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:0.08em;color:#A0A4A8;border:1px solid #3A4044;border-radius:4px;padding:3px 8px;\">TOOLING<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 9px;\">Web App Fuzzer (QT6)<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.5;color:#A0A4A8;margin:0;flex:1;\">A web-application fuzzer with a friendly QT6 graphical interface, built to surface vulnerabilities through automated testing.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">Learn more<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fspan>\n        <\u002Fa>\n\n        <a href=\"https://wizardml7.github.io/metadataAnalyzer\" target=\"_blank\" style=\"display:flex;flex-direction:column;background:#1A1F23;border:1px solid #2a3036;border-radius:12px;padding:26px;min-height:230px;color:#fff;transition:border-color 200ms,transform 200ms;\" style-hover=\"border-color:#535B61;transform:translateY(-3px);\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;\">\n            <span style=\"display:inline-flex;width:46px;height:46px;border-radius:10px;background:rgba(160,164,168,0.12);align-items:center;justify-content:center;\"><i data-lucide=\"file-search\" style=\"width:24px;height:24px;color:#cfd2d6;\"><\u002Fi><\u002Fspan>\n            <span style=\"font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:0.08em;color:#A0A4A8;border:1px solid #3A4044;border-radius:4px;padding:3px 8px;\">TOOLING<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-size:20px;font-weight:700;margin:0 0 9px;\">Metadata Analyzer<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.5;color:#A0A4A8;margin:0;flex:1;\">A Python utility that generates detailed metadata reports from files to support investigation and triage workflows.<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:13.5px;color:#fff;font-weight:600;\">Learn more<i data-lucide=\"arrow-up-right\" style=\"width:14px;height:14px;\"><\u002Fi><\u002Fs uot;: 2600 },\n  &quot;heroVariant&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;spotlight&quot;, &quot;options&quot;: [&quot;spotlight&quot;, &quot;terminal&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;scanlines&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.THEMES = {\n      teal:    { accent: '#13C4DC', hot: '#45E2F3', rgb: '19,196,220' },\n      azure:   { accent: '#3D8BFF', hot: '#6BA8FF', rgb: '61,139,255' },\n      arcane:  { accent: '#8A6CFF', hot: '#A98EFF', rgb: '138,108,255' },\n      emerald: { accent: '#1FB46A', hot: '#36D483', rgb: '31,180,106' },\n      gold:    { accent: '#E5A52E', hot: '#F4C45A', rgb: '229,165,46' },\n      magenta: { accent: '#FF4D8D', hot: '#FF6FA3', rgb: '255,77,141' },\n    };\n    this.state = { theme: 'teal' };\n  }\n\n  componentDidMount() {\n    let t = 'teal';\n    try { t = localStorage.getItem('wzml7_theme') || 'teal'; } catch (e) {}\n    if (!this.THEMES[t]) t = 'teal';\n    this.applyTheme(t);\n    this.setState({ theme: t });\n    this._icons();\n    this.initStars();\n  }\n\n  componentDidUpdate() { this._icons(); this.ensureStars(); }\n\n  applyTheme(name) {\n    const p = this.THEMES[name] || this.THEMES.teal;\n    const r = document.documentElement.style;\n    r.setProperty('--accent', p.accent);\n    r.setProperty('--accent-hot', p.hot);\n    r.setProperty('--accent-rgb', p.rgb);\n  }\n\n  setTheme(name) {\n    if (!this.THEMES[name]) return;\n    try { localStorage.setItem('wzml7_theme', name); } catch (e) {}\n    this.applyTheme(name);\n    this.setState({ theme: name });\n    this.loadStars();\n  }\n\n  _icons() {\n    const draw = () => { try { if (window.lucide) window.lucide.createIcons(); } catch (e) {} };\n    draw(); setTimeout(draw, 120); setTimeout(draw, 400);\n  }\n\n  initStars(tries) {\n    tries = tries || 0;\n    if (typeof window === 'undefined') return;\n    if (!window.tsParticles) { if (tries < 50) setTimeout(() => this.initStars(tries + 1), 150); return; }\n    this.loadStars();\n  }\n\n  ensureStars() {\n    const el = document.getElementById('hero-stars');\n    if (el && !el.querySelector('canvas')) this.loadStars();\n  }\n\n  async loadStars() {\n    if (!window.tsParticles) return;\n    const el = document.getElementById('hero-stars');\n    if (!el) { return; }\n    let accent = '#13C4DC';\n    try { accent = (getComputedStyle(document.documentElement).getPropertyValue('--accent') || '#13C4DC').trim(); } catch (e) {}\n    try { if (this._stars) { this._stars.destroy(); this._stars = null; } } catch (e) {}\n    try {\n      this._stars = await window.tsParticles.load({\n        id: 'hero-stars',\n        options: {\n          fullScreen: { enable: false },\n          fpsLimit: 60,\n          detectRetina: true,\n          particles: {\n            number: { value: 60, density: { enable: true, area: 800 } },\n            color: { value: ['#ffffff', '#ffffff', '#dfe6ee', accent] },\n            shape: { type: 'star', options: { star: { sides: 4, inset: 2 } } },\n            opacity: { value: { min: 0.06, max: 0.85 }, animation: { enable: true, speed: 1.5, sync: false, startValue: 'random' } },\n            size: { value: { min: 0.5, max: 2.7 } },\n            move: { enable: true, speed: 0.22, direction: 'none', random: true, straight: false, outModes: { default: 'out' } },\n            rotate: { value: { min: 0, max: 360 }, animation: { enable: true, speed: 2, sync: false } },\n            links: { enable: false },\n          },\n        },\n      });\n    } catch (e) {}\n  }\n\n  renderVals() {\n    const v = this.props.heroVariant ?? 'spotlight';\n    const cur = this.state.theme;\n    const sw = (c, name) =>\n      'width:22px;height:22px;border-radius:50%;cursor:pointer;padding:0;background:' + c +\n      ';border:2px solid #0D0D0D;box-shadow:0 0 0 ' + (cur === name ? '2px #fff' : '1px #3a4044') +\n      ';transition:box-shadow 150ms;';\n    return {\n      heroSpotlight: v === 'spotlight',\n      heroTerminal: v === 'terminal',\n      scanlines: this.props.scanlines ?? false,\n      setTeal: () => this.setTheme('teal'),\n      setAzure: () => this.setTheme('azure'),\n      setArcane: () => this.setTheme('arcane'),\n      setEmerald: () => this.setTheme('emerald'),\n      setGold: () => this.setTheme('gold'),\n      setMagenta: () => this.setTheme('magenta'),\n      swTeal: sw('#13C4DC', 'teal'),\n      swAzure: sw('#3D8BFF', 'azure'),\n      swArcane: sw('#8A6CFF', 'arcane'),\n      swEmerald: sw('#1FB46A', 'emerald'),\n      swGold: sw('#E5A52E', 'gold'),\n      swMagenta: sw('#FF4D8D', 'magenta'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Portfolio.dc"}
